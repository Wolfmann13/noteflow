<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NoteFlow">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="NoteFlow — A premium, customizable notes app with categories, templates, and sharing.">
  <title>NoteFlow</title>
  <link rel="manifest" href="src/manifest.json">
  <link rel="apple-touch-icon" href="src/assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>

  <!-- ===== SPLASH SCREEN ===== -->
  <div id="splash-screen" class="splash">
    <div class="splash-logo">📝</div>
    <div class="splash-title">NoteFlow</div>
    <div class="splash-loader"><div class="loader-bar"></div></div>
  </div>

  <!-- ===== MAIN APP SHELL ===== -->
  <div id="app" class="app hidden">

    <!-- ===== HOME VIEW ===== -->
    <section id="view-home" class="view active">
      <header class="view-header">
        <div class="header-top">
          <h1 class="app-title">NoteFlow</h1>
          <div class="header-actions">
            <button id="btn-search-toggle" class="icon-btn" aria-label="Search">
              <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/><path d="m15 15 5 5"/></svg>
            </button>
            <button id="btn-settings" class="icon-btn" aria-label="Settings">
              <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="3"/><path d="M11 2v3m0 12v3M2 11h3m12 0h3m-2.5-6.5-2.1 2.1M6.6 15.4l-2.1 2.1m0-11.1 2.1 2.1m8.8 8.8 2.1 2.1"/></svg>
            </button>
          </div>
        </div>
        <div id="search-bar" class="search-bar hidden">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="6"/><path d="m13 13 4 4"/></svg>
          <input type="text" id="search-input" placeholder="Search notes..." autocomplete="off">
          <button id="btn-search-clear" class="search-clear" aria-label="Clear search">&times;</button>
        </div>
        <!-- Category filter pills -->
        <div id="category-pills" class="category-pills">
          <button class="pill active" data-category="all">All</button>
        </div>
      </header>

      <main class="notes-grid" id="notes-grid">
        <!-- Notes rendered by JS -->
        <div id="empty-state" class="empty-state">
          <div class="empty-icon">📝</div>
          <p class="empty-text">No notes yet</p>
          <p class="empty-sub">Tap + to create your first note</p>
        </div>
      </main>

      <button id="btn-new-note" class="fab" aria-label="New note">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 6v16M6 14h16"/></svg>
      </button>
    </section>

    <!-- ===== NEW NOTE SHEET (choose blank or template) ===== -->
    <div id="sheet-new" class="bottom-sheet">
      <div class="sheet-backdrop"></div>
      <div class="sheet-content">
        <div class="sheet-handle"></div>
        <h2 class="sheet-title">Create Note</h2>
        <div class="sheet-options">
          <button id="btn-blank-note" class="sheet-option">
            <span class="sheet-option-icon">📄</span>
            <span>Blank Note</span>
          </button>
          <button id="btn-template-pick" class="sheet-option">
            <span class="sheet-option-icon">📋</span>
            <span>From Template</span>
          </button>
        </div>
        <div id="template-list" class="template-list hidden">
          <!-- Templates rendered by JS -->
        </div>
      </div>
    </div>

    <!-- ===== EDITOR VIEW ===== -->
    <section id="view-editor" class="view">
      <header class="view-header editor-header">
        <button id="btn-back" class="icon-btn" aria-label="Back">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 4 7 11l8 7"/></svg>
        </button>
        <div class="editor-actions">
          <button id="btn-history" class="icon-btn" aria-label="Edit history">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="8"/><path d="M10 5v5l3 3"/></svg>
          </button>
          <button id="btn-share" class="icon-btn" aria-label="Share">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v5a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-5M10 2v10M6 6l4-4 4 4"/></svg>
          </button>
          <button id="btn-delete-note" class="icon-btn danger" aria-label="Delete">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h14M7 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h10z"/></svg>
          </button>
        </div>
      </header>
      <div class="editor-body">
        <input type="text" id="editor-title" class="editor-title" placeholder="Note title" autocomplete="off">
        <button id="editor-category-btn" class="editor-category-btn">
          <span id="editor-category-dot" class="cat-dot"></span>
          <span id="editor-category-label">No category</span>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="m4 6 4 4 4-4"/></svg>
        </button>
        <div id="editor-content" class="editor-content" contenteditable="true" data-placeholder="Start writing..."></div>
        <div id="checklist-section" class="checklist-section">
          <div class="checklist-header">
            <span class="checklist-label">Checklist</span>
            <button id="btn-add-check" class="small-btn">+ Add item</button>
          </div>
          <div id="checklist-items" class="checklist-items">
            <!-- Check items rendered by JS -->
          </div>
        </div>
      </div>
    </section>

    <!-- ===== CATEGORY PICKER SHEET ===== -->
    <div id="sheet-category" class="bottom-sheet">
      <div class="sheet-backdrop"></div>
      <div class="sheet-content">
        <div class="sheet-handle"></div>
        <h2 class="sheet-title">Choose Category</h2>
        <div id="category-list" class="category-list">
          <!-- Categories rendered by JS -->
        </div>
        <button id="btn-new-category" class="sheet-option add-cat">
          <span class="sheet-option-icon">＋</span>
          <span>New Category</span>
        </button>
        <div id="new-cat-form" class="new-cat-form hidden">
          <input type="text" id="new-cat-name" placeholder="Category name" autocomplete="off">
          <div class="color-picker" id="color-picker">
            <!-- Color dots rendered by JS -->
          </div>
          <button id="btn-save-cat" class="primary-btn">Save</button>
        </div>
      </div>
    </div>

    <!-- ===== EDIT HISTORY SHEET ===== -->
    <div id="sheet-history" class="bottom-sheet">
      <div class="sheet-backdrop"></div>
      <div class="sheet-content sheet-content-tall">
        <div class="sheet-handle"></div>
        <h2 class="sheet-title">Edit History</h2>
        <div id="history-list" class="history-list">
          <!-- History entries rendered by JS -->
        </div>
      </div>
    </div>

    <!-- ===== SETTINGS VIEW ===== -->
    <section id="view-settings" class="view">
      <header class="view-header">
        <button id="btn-settings-back" class="icon-btn" aria-label="Back">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 4 7 11l8 7"/></svg>
        </button>
        <h2 class="view-title">Settings</h2>
        <div></div>
      </header>
      <div class="settings-body">
        <div class="settings-group">
          <label class="settings-label">Your Name</label>
          <p class="settings-hint">Used to track who made edits</p>
          <input type="text" id="settings-name" class="settings-input" placeholder="Enter your name" autocomplete="off">
        </div>
        <div class="settings-group">
          <label class="settings-label">Appearance</label>
          <div class="toggle-row">
            <span>Dark Mode</span>
            <label class="toggle">
              <input type="checkbox" id="toggle-dark" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="settings-group">
          <label class="settings-label">Data</label>
          <button id="btn-export" class="settings-btn">Export All Notes (JSON)</button>
          <button id="btn-import" class="settings-btn">Import Notes (JSON)</button>
          <input type="file" id="import-file" accept=".json" class="hidden">
        </div>
        <div class="settings-group">
          <label class="settings-label">Manage Categories</label>
          <div id="settings-categories" class="settings-categories">
            <!-- managed categories rendered by JS -->
          </div>
        </div>
        <div class="settings-group">
          <label class="settings-label">Manage Templates</label>
          <button id="btn-new-template" class="settings-btn accent">+ New Template</button>
          <div id="settings-templates" class="settings-templates">
            <!-- managed templates rendered by JS -->
          </div>
        </div>
      </div>
    </section>

    <!-- ===== TEMPLATE EDITOR VIEW ===== -->
    <section id="view-template-editor" class="view">
      <header class="view-header">
        <button id="btn-tpl-back" class="icon-btn" aria-label="Back">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 4 7 11l8 7"/></svg>
        </button>
        <h2 class="view-title" id="tpl-editor-title">New Template</h2>
        <button id="btn-save-template" class="text-btn">Save</button>
      </header>
      <div class="editor-body">
        <input type="text" id="tpl-name" class="editor-title" placeholder="Template name" autocomplete="off">
        <div class="tpl-type-row">
          <label class="settings-label">Recurrence</label>
          <select id="tpl-recurrence" class="settings-select">
            <option value="none">None</option>
            <option value="biweekly">Bi-Weekly</option>
            <option value="monthly">Monthly</option>
          </select>
        </div>
        <div id="tpl-content" class="editor-content" contenteditable="true" data-placeholder="Template body..."></div>
        <div class="checklist-section">
          <div class="checklist-header">
            <span class="checklist-label">Default Checklist Items</span>
            <button id="btn-tpl-add-check" class="small-btn">+ Add item</button>
          </div>
          <div id="tpl-checklist-items" class="checklist-items"></div>
        </div>
      </div>
    </section>

    <!-- === Toast === -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="src/js/app.js"></script>
</body>
</html>
